
<!DOCTYPE html>
<html>

<head>
<title>Class Community</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Class 12 Community</h2>

<h3>Add Student</h3>

<<h2>Create Your Profile</h2>

<div class="profile-form">

<input id="name" placeholder="Full Name">

<input id="roll" placeholder="Roll Number">

<input id="phone" placeholder="Phone Number">

<input id="bio" placeholder="Short Bio (example: Preparing for JEE)">

<input id="photo" placeholder="Profile Photo URL">

<button onclick="addStudent()">Create Profile</button>

</div>

<h2>Class Profiles</h2>

<div id="students"></div>>

<button onclick="addStudent()">Add Student</button>

<h3>Students List</h3>

<div id="students"></div>

<h3>Class Chat</h3>

<div id="chatBox"></div>

<input id="chatName" placeholder="Name">
<input id="chatMsg" placeholder="Message">

<button onclick="sendMsg()">Send</button>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</body>
</html>
