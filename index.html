<!DOCTYPE html>
<html>

<head>
<title>Class Community</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Class 12 Community</h2>

<h3>Add Student</h3>

<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll">
<input id="phone" placeholder="Phone">

<button onclick="addStudent()">Add Student</button>

<h3>Students List</h3>

<div id="students"></div>

<h3>Class Chat</h3>

<div id="chatBox"></div>

<input id="chatName" placeholder="Name">
<input id="chatMsg" placeholder="Message">

<button onclick="sendMsg()">Send</button>

<script src="script.js"></script>

</body>
</html>
